version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      dev-tooling:
        patterns:
          - "@biomejs/*"
          - "@arethetypeswrong/*"
          - "publint"
          - "tsdown"
          - "tsx"
          - "typedoc"
          - "typescript"
          - "vitest"
      changesets:
        patterns:
          - "@changesets/*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
