name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [24]
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome ci)
        run: pnpm run ci

      - name: Type check (src + test)
        run: pnpm run type-check

      - name: Unit tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Verify instanceof invariants
        run: node scripts/verify-instanceof.mjs

      - name: Check exports (attw + publint)
        run: pnpm run check-exports

      - name: Generate API reference (typedoc, warnings-as-errors)
        run: pnpm run docs

  integration:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      dynamodb:
        # Pin to a specific tag for reproducibility; update deliberately during upgrade
        image: amazon/dynamodb-local:2.5.4
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null http://localhost:8000/; then
              echo "DynamoDB Local is up"
              exit 0
            fi
            sleep 1
          done
          echo "DynamoDB Local did not become available"
          exit 1

      - name: Integration tests
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
        run: pnpm run test:integration
